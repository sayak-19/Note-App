name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 * * 1,4'   # Runs every Monday and Thursday at 9:00 AM UTC
  workflow_dispatch:          # Allows you to trigger it manually too

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Response code: $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase is alive!"
          else
            echo "❌ Ping failed with status $response"
            exit 1
          fi
